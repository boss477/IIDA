<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Floor plan viewer</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <div id="app">
    <header class="bar" id="toolbar"></header>
    <main id="stage">
      <aside id="catalog-drawer" class="catalog-drawer" hidden>
        <div class="catalog-drawer__top">
          <div class="catalog-tabs" role="tablist" aria-label="Catalog tabs">
            <button type="button" class="catalog-tab catalog-tab--active" data-tab="add" role="tab" aria-selected="true">
              Add
            </button>
            <button type="button" class="catalog-tab" data-tab="list" role="tab" aria-selected="false">
              List
            </button>
            <button type="button" class="catalog-tab" data-tab="favorites" role="tab" aria-selected="false">
              Favorites
            </button>
          </div>
          <button type="button" class="catalog-close" id="catalog-close" aria-label="Close catalog">
            ✕
          </button>
        </div>

        <div class="catalog-controls">
          <div class="catalog-search">
            <span class="catalog-search__icon" aria-hidden="true">🔎</span>
            <input id="catalog-search" type="search" placeholder="Search…" autocomplete="off" />
          </div>
          <div class="catalog-filters">
            <select id="catalog-room" aria-label="Room">
              <option value="">All rooms</option>
              <option value="living">Living room</option>
              <option value="bedroom">Bedroom</option>
              <option value="dining">Dining</option>
              <option value="office">Office</option>
            </select>
            <select id="catalog-category" aria-label="Category">
              <option value="">All categories</option>
            </select>
          </div>
          <div id="catalog-chips" class="catalog-chips" aria-label="Quick categories"></div>
        </div>

        <div class="catalog-body">
          <div id="catalog-grid" class="catalog-grid" aria-label="Catalog products"></div>
          <div id="catalog-list" class="catalog-list" hidden></div>
        </div>
      </aside>
      <div id="viewport">
        <div id="content">
          <div class="plan-wrap" id="planWrap">
            <img id="plan" alt="Floor plan" crossorigin="anonymous" />
            <svg id="overlay" viewBox="0 0 1000 1000" preserveAspectRatio="none" aria-hidden="true"></svg>
          </div>
        </div>
      </div>
      <div id="viewport3d" style="display: none;">
        <div id="view3d-hint">Click furniture to select</div>
        <div id="view3d-side-panel" hidden></div>
        <div id="view3d-chrome" hidden>
          <div id="view3d-bar">
            <button type="button" class="view3d-btn view3d-btn--active" id="btn3d-dollhouse" data-mode="dollhouse">
              Dollhouse
            </button>
            <span class="view3d-sep"></span>
            <button type="button" class="view3d-btn" id="btn3d-top" data-mode="top">
              Top view
            </button>
            <span class="view3d-sep"></span>
            <button type="button" class="view3d-btn" id="btn3d-side" data-mode="side">
              Side views ▾
            </button>
            <span class="view3d-sep"></span>
            <button type="button" class="view3d-btn" id="btn3d-move" data-mode="move">
              Move
            </button>
          </div>
        </div>
      </div>
    </main>
    <div id="tip" role="tooltip" hidden></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
