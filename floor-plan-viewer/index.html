<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Floor plan viewer</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <div id="app">
    <header class="bar" id="toolbar"></header>
    <main id="stage">
      <div id="viewport">
        <div id="content">
          <div class="plan-wrap" id="planWrap">
            <img id="plan" alt="Floor plan" crossorigin="anonymous" />
            <svg id="overlay" viewBox="0 0 1000 1000" preserveAspectRatio="none" aria-hidden="true"></svg>
          </div>
        </div>
      </div>
      <div id="viewport3d" style="display: none;">
        <div id="view3d-hint">Click furniture to select</div>
        <div id="view3d-side-panel" hidden></div>
        <div id="view3d-chrome" hidden>
          <div id="view3d-bar">
            <button type="button" class="view3d-btn view3d-btn--active" id="btn3d-dollhouse" data-mode="dollhouse">
              Dollhouse
            </button>
            <span class="view3d-sep"></span>
            <button type="button" class="view3d-btn" id="btn3d-top" data-mode="top">
              Top view
            </button>
            <span class="view3d-sep"></span>
            <button type="button" class="view3d-btn" id="btn3d-side" data-mode="side">
              Side views ▾
            </button>
            <span class="view3d-sep"></span>
            <button type="button" class="view3d-btn" id="btn3d-move" data-mode="move">
              Move
            </button>
          </div>
        </div>
      </div>
    </main>
    <div id="tip" role="tooltip" hidden></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
